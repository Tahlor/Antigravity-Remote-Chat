<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Antigravity Shit-Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a !important;
            color: #fff !important;
            height: 100vh;
            /* Fallback */
            height: 100dvh;
            /* Dynamic constraint */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0 !important;
        }

        /* Cascade Selector / Header */
        .headers-container {
            background: #2a2a2a !important;
            border-bottom: 1px solid #3a3a3a !important;
            position: relative;
            z-index: 100;
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .cascade-tab {
            padding: 12px 16px;
            cursor: pointer;
            border-right: 1px solid #3a3a3a;
            opacity: 0.6;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cascade-tab.active {
            opacity: 1;
            background: #333;
            border-bottom: 2px solid #3b82f6;
        }

        .cascade-tab .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .cascade-tab.active-window .status {
            background: #4ade80;
        }

        /* Green if optimized/active window */

        .chat-container {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        .chat-content {
            padding: 16px;
            min-height: 100%;
        }

        .input-section {
            background: #2a2a2a !important;
            padding: 12px;
            /* Account for mobile safe areas */
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid #3a3a3a !important;
            position: relative;
            z-index: 1000;
            /* Increased z-index */
            display: flex;
            gap: 8px;
        }

        textarea {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            color: white;
            padding: 8px;
            border-radius: 6px;
            resize: none;
            height: 40px;
        }

        button {
            padding: 0 20px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            color: #666;
            margin-top: 50px;
        }
    </style>
    <style id="cascade-style">
        /* Dynamic styles will be injected here */
    </style>
</head>

<body>

    <div class="headers-container" id="tabsContainer">
        <div class="cascade-tab dashboard-control" onclick="toggleDashboard()" style="background:#4b5563;">
            <span style="font-weight:bold;">📊 Dashboard</span>
        </div>
        <div id="dynamicTabs" style="display:flex"></div>
    </div>

    <div id="dashboardPanel" style="display:none; padding: 20px; background: #1a1a1a; flex:1; overflow-y:auto; padding-bottom:100px;">
        <h2>Dashboard & Toolkit</h2>
        <div style="margin-top: 24px; padding:16px; background:#2a2a2a; border-radius:12px; border:1px solid #3a3a3a;">
           <label style="display:flex; align-items:flex-start; gap:12px; cursor:pointer;">
             <input type="checkbox" id="autoAcceptToggle" onchange="toggleAutoAccept(this.checked)" style="width:24px; height:24px; margin-top:2px;" />
             <div>
                <div style="font-size:18px; font-weight:600;">Enable Agent Auto-Accept</div>
                <div style="color:#aaa; margin-top:4px; font-size:14px; line-height:1.4;">
                    Automatically approves agent executions, terminal commands, and file edits.
                    Runs natively inside IDE using injected CDP scripts.
                </div>
             </div>
           </label>
        </div>
        
        <div style="margin-top: 32px;">
           <h3 style="border-bottom:1px solid #333; padding-bottom:8px;">Compute Quota</h3>
           <div id="dashboardQuota" style="margin-top:16px; color:#aaa;">Loading quota...</div>
        </div>
        
        <div style="margin-top: 32px;">
           <h3 style="border-bottom:1px solid #333; padding-bottom:8px;">Local Cache</h3>
           <div id="dashboardCache" style="margin-top:16px; color:#aaa;">Loading cache...</div>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-content" id="chatContent">
            <div class="loading">Waiting for connection...</div>
        </div>
    </div>

    <div class="input-section">
        <textarea id="messageInput" placeholder="Type a message..."></textarea>
        <button id="sendBtn">Send</button>
    </div>

    <script>
        const tabsContainer = document.getElementById('tabsContainer');
        const dynamicTabs = document.getElementById('dynamicTabs');
        const chatContent = document.getElementById('chatContent');
        const chatContainer = document.getElementById('chatContainer');
        const dashboardPanel = document.getElementById('dashboardPanel');
        const inputSection = document.querySelector('.input-section');

        let cascades = [];
        let currentCascadeId = null;
        let ws = null;
        let isDashboardOpen = false;
        let dashboardInterval = null;

        function toggleDashboard() {
            isDashboardOpen = !isDashboardOpen;
            if (isDashboardOpen) {
                chatContainer.style.display = 'none';
                inputSection.style.display = 'none';
                dashboardPanel.style.display = 'block';
                refreshDashboard();
                dashboardInterval = setInterval(refreshDashboard, 5000);
            } else {
                dashboardPanel.style.display = 'none';
                chatContainer.style.display = 'block';
                inputSection.style.display = 'flex';
                if (dashboardInterval) clearInterval(dashboardInterval);
            }
            renderTabs();
        }

        async function fetchAutoAcceptStatus() {
            try {
                const res = await fetch('/api/auto-accept/status');
                const data = await res.json();
                document.getElementById('autoAcceptToggle').checked = data.enabled;
            } catch(e) {}
        }
        
        async function toggleAutoAccept(enabled) {
            try {
                await fetch('/api/auto-accept', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ enabled })
                });
            } catch(e) {
                alert('Failed to toggle auto-accept');
                document.getElementById('autoAcceptToggle').checked = !enabled;
            }
        }

        async function refreshDashboard() {
            fetchAutoAcceptStatus();
            try {
                const qRes = await fetch('/api/dashboard/quota');
                if (qRes.ok) {
                    const qData = await qRes.json();
                    let html = '';
                    if (qData.tokenUsage) {
                        html += '<div style="display:flex; gap:16px; margin-bottom:16px;">';
                        if (qData.tokenUsage.promptCredits) {
                            html += `<div style="background:#2a2a2a; padding:12px; border-radius:8px; flex:1;">
                                <div style="font-size:12px; color:#888;">Prompt Credits</div>
                                <div style="font-size:20px; font-weight:bold; color:white;">${qData.tokenUsage.promptCredits.available} / ${qData.tokenUsage.promptCredits.monthly}</div>
                            </div>`;
                        }
                        if (qData.tokenUsage.flowCredits) {
                            html += `<div style="background:#2a2a2a; padding:12px; border-radius:8px; flex:1;">
                                <div style="font-size:12px; color:#888;">Flow Credits</div>
                                <div style="font-size:20px; font-weight:bold; color:white;">${qData.tokenUsage.flowCredits.available} / ${qData.tokenUsage.flowCredits.monthly}</div>
                            </div>`;
                        }
                        html += '</div>';
                    }
                    if (qData.models) {
                        html += '<div style="margin-top:10px; display:flex; gap:10px; overflow-x:auto;">';
                        qData.models.forEach(m => {
                            html += `<div style="background:#222; padding:10px; border-radius:8px; min-width:160px; border:1px solid #333;">
                                <strong style="color:white;">${m.label}</strong><br/>
                                <div style="width:100%; height:6px; background:#444; border-radius:3px; margin:8px 0; overflow:hidden;">
                                    <div style="height:100%; width:${m.remainingPct}%; background:${m.isExhausted?'#ef4444':'#3b82f6'};"></div>
                                </div>
                                <div style="display:flex; justify-content:space-between;">
                                    <small style="color:#aaa;">${m.remainingPct.toFixed(1)}%</small>
                                    <small style="color:#888;">${m.timeUntilReset}</small>
                                </div>
                            </div>`;
                        });
                        html += '</div>';
                    }
                    document.getElementById('dashboardQuota').innerHTML = html || 'No quota info available.';
                } else document.getElementById('dashboardQuota').innerHTML = 'Language Server not active.';
            } catch(e) { document.getElementById('dashboardQuota').innerHTML = 'Error fetching quota.'; }

            try {
                const cRes = await fetch('/api/dashboard/cache');
                if (cRes.ok) {
                    const cData = await cRes.json();
                    document.getElementById('dashboardCache').innerHTML = `
                        <div style="background:#2a2a2a; padding:16px; border-radius:8px;">
                            <p style="font-size:24px; font-weight:bold; color:white; margin-bottom:12px;">${cData.totalSizeHr}</p>
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                <span style="color:#aaa;">Brain Tasks (${cData.brainCount})</span>
                                <span style="color:white;">${cData.brainSizeHr}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between;">
                                <span style="color:#aaa;">Conversations (${cData.conversationsCount})</span>
                                <span style="color:white;">${cData.conversationsSizeHr}</span>
                            </div>
                        </div>
                    `;
                }
            } catch(e) {}
        }

        function connect() {
            ws = new WebSocket(`ws://${location.host}`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'cascade_list') {
                    cascades = data.cascades;
                    renderTabs();

                    // Auto-select first if none selected
                    if (!currentCascadeId && cascades.length > 0) {
                        selectCascade(cascades[0].id);
                    }
                }

                if (data.type === 'snapshot_update') {
                    if (data.cascadeId === currentCascadeId) {
                        updateContentOnly(currentCascadeId);
                    }
                }
            };

            ws.onclose = () => setTimeout(connect, 2000);
        }

        function renderTabs() {
            const dashboardTab = document.querySelector('.dashboard-control');
            if (isDashboardOpen) {
                dashboardTab.style.background = '#3b82f6';
                dashboardTab.style.opacity = '1';
                dashboardTab.style.borderBottom = '2px solid white';
            } else {
                dashboardTab.style.background = '#4b5563';
                dashboardTab.style.opacity = '0.8';
                dashboardTab.style.borderBottom = 'none';
            }

            dynamicTabs.innerHTML = cascades.map(c => `
                <div class="cascade-tab ${c.id === currentCascadeId && !isDashboardOpen ? 'active' : ''} ${c.active ? 'active-window' : ''}" 
                     onclick="selectCascade('${c.id}')">
                    <div class="status"></div>
                    ${c.title || 'Untitled'}
                </div>
            `).join('');

            if (cascades.length === 0) {
                dynamicTabs.innerHTML = '<div class="cascade-tab">No chats found</div>';
            }
        }

        function selectCascade(id) {
            if (isDashboardOpen) toggleDashboard();
            currentCascadeId = id;
            renderTabs();
            loadCascade(id);
        }

        async function loadCascade(id) {
            try {
                // 1. Fetch Styles (Once)
                const styleRes = await fetch(`/styles/${id}`);
                if (styleRes.ok) {
                    const styleData = await styleRes.json();
                    document.getElementById('cascade-style').textContent = `
                        ${styleData.css}
                        #cascade { 
                            background: transparent !important; 
                            color: white !important; 
                        }
                        #cascade .prose {
                            --tw-prose-body: #e5e7eb !important;
                            --tw-prose-headings: #f3f4f6 !important;
                            --tw-prose-lead: #e5e7eb !important;
                            --tw-prose-links: #60a5fa !important;
                            --tw-prose-bold: #f3f4f6 !important;
                            --tw-prose-counters: #9ca3af !important;
                            --tw-prose-bullets: #d1d5db !important;
                            --tw-prose-hr: #374151 !important;
                            --tw-prose-quotes: #f3f4f6 !important;
                            --tw-prose-quote-borders: #374151 !important;
                            --tw-prose-captions: #9ca3af !important;
                            --tw-prose-code: #f3f4f6 !important;
                            --tw-prose-pre-code: #e5e7eb !important;
                            --tw-prose-pre-bg: #1f2937 !important;
                            --tw-prose-th-borders: #374151 !important;
                            --tw-prose-td-borders: #374151 !important;
                            color: #e5e7eb !important; /* Force color explicitly too */
                        }
                        /* Ensure code blocks are readable */
                        pre, code { background: #111 !important; color: #ddd !important; }
                    `;
                }

                // 2. Fetch Content
                await updateContentOnly(id);
            } catch (e) { console.error(e); }
        }

        async function updateContentOnly(id) {
            try {
                const res = await fetch(`/snapshot/${id}`);
                if (!res.ok) throw new Error('Failed');
                const data = await res.json();

                // Preserve Scroll
                const isAtBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < 50;

                document.body.style.backgroundColor = data.bodyBg || '#1a1a1a';
                chatContent.innerHTML = data.html;
                // No inner style block needed anymore

                if (isAtBottom) chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (e) { }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value;
            if (!text || !currentCascadeId) return;

            // Clear immediately to feel responsive
            input.value = '';

            try {
                await fetch(`/send/${currentCascadeId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                updateContentOnly(currentCascadeId); // Immediate refresh try
            } catch (e) {
                console.error("Send failed", e);
                input.value = text; // Restore on fail
                alert("Failed to send message: " + e.message);
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;

        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        connect();
    </script>
</body>

</html>
